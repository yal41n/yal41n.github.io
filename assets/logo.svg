<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 44" width="240" height="44" role="img" aria-label="GAPLIZZER logo">
  <!-- Crosshair/target mark symbolising gap identification -->
  <circle cx="20" cy="22" r="14" fill="none" stroke="#22d3ee" stroke-width="1.8" opacity="0.35"/>
  <circle cx="20" cy="22" r="8"  fill="none" stroke="#22d3ee" stroke-width="1.8"/>
  <circle cx="20" cy="22" r="2.5" fill="#22d3ee"/>
  <!-- axis ticks -->
  <line x1="20" y1="5"  x2="20" y2="11" stroke="#22d3ee" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="20" y1="33" x2="20" y2="39" stroke="#22d3ee" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="3"  y1="22" x2="9"  y2="22" stroke="#22d3ee" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="31" y1="22" x2="37" y2="22" stroke="#22d3ee" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Wordmark -->
  <text x="47" y="30" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="21" font-weight="700" letter-spacing="-0.3" fill="#ffffff">GAP</text>
  <text x="97" y="30" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="21" font-weight="700" letter-spacing="-0.3" fill="#22d3ee">LIZZER</text>
</svg>
